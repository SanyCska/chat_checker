name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        id: lower
        run: echo "image_name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ steps.lower.outputs.image_name }}
          tags: |
            type=sha
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          REPO: ${{ github.repository }}
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          NOTIFY_USER_ID: ${{ secrets.NOTIFY_USER_ID }}
          PHONE_NUMBER: ${{ secrets.PHONE_NUMBER }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          TOPIC_ID: ${{ secrets.TOPIC_ID }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: REPO,API_ID,API_HASH,BOT_TOKEN,NOTIFY_USER_ID,PHONE_NUMBER,CHAT_ID,TOPIC_ID
          script: |
            set -e
            APP_DIR=~/chat-checker
            REPO_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${REPO}.git"
            BRANCH="${{ github.ref_name }}"
            IMAGE_NAME=$(echo "$REPO" | tr '[:upper:]' '[:lower:]')

            # Clone or update repo
            if [ ! -d "$APP_DIR/.git" ]; then
              rm -rf "$APP_DIR"
              git clone --branch "$BRANCH" "$REPO_URL" "$APP_DIR"
            fi
            cd "$APP_DIR"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"

            # Create sessions dir (host-mounted volume)
            mkdir -p "$APP_DIR/sessions"

            # Write .env so Compose (and container) always have the config
            cat > "$APP_DIR/.env" <<EOF
GITHUB_REPOSITORY=${IMAGE_NAME}
API_ID=${API_ID}
API_HASH=${API_HASH}
BOT_TOKEN=${BOT_TOKEN}
NOTIFY_USER_ID=${NOTIFY_USER_ID}
PHONE_NUMBER=${PHONE_NUMBER}
CHAT_ID=${CHAT_ID}
TOPIC_ID=${TOPIC_ID}
EOF
            chmod 600 "$APP_DIR/.env"

            # Pull image and (re)start
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker compose pull
            docker compose up -d --force-recreate
            docker image prune -f

            echo "Deploy complete. Container status:"
            docker compose ps
